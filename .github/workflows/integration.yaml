name: Integration (kind)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      RK8S_E2E: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: rk8s-it
          # kind v0.23 -> Kubernetes 1.30; pin so the integration suite is
          # reproducible. Bump in lockstep with tools/gen/spec/swagger.json.
          node_image: kindest/node:v1.30.4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::withr
            any::callr
            any::websocket
            any::later
          needs: check

      - name: Install rk8s
        run: |
          R CMD INSTALL .

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl get ns

      - name: Run integration tests
        run: Rscript tests/integration/run.R
